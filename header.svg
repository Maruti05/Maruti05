<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#38bdf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)" rx="16"/>

  <line x1="50" y1="60" x2="850" y2="60" stroke="url(#glow)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </line>

  <text x="450" y="95" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="url(#textGrad)" filter="url(#shadow)">
    Maruti Mangrani
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#8b949e" letter-spacing="3">
    Senior Software Engineer · Full Stack Developer
  </text>

  <text x="450" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6e7681" letter-spacing="1">
    React.js · Spring Boot · Flutter · Java · TypeScript
  </text>

  <line x1="50" y1="190" x2="850" y2="190" stroke="url(#glow)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" begin="2s" repeatCount="indefinite"/>
  </line>

  <circle cx="450" cy="200" r="2" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
